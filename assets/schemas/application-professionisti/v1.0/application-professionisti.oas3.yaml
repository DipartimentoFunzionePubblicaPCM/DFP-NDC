openapi: 3.0.1

info:
  title: Entry point for applications of public competitions of type “Selezione per professionisti ed esperti”
  description: Enables searching applications of public competitions of type “Selezione per professionisti ed esperti” registered on the InPA Recruitment Portal.
  termsOfService: /tos
  x-summary: applications of public competitions of type “Selezione per professionisti ed esperti”
  contact:
    name: Dipartimento della Funzione Pubblica
    url: https://www.funzionepubblica.gov.it
  version: 0.0.1

tags:
  - name: competition-data
    description: Operations related to public competitions
  - name: application-data
    description: Operations related to applications of public competitions
  - name: ranking-data
    description: Operations related to rankings of public competitions
  - name: exam-data
    description: Operations related to exams of public competitions
  - name: fee-data
    description: Operations related to fees of public competitions
  - name: service-status
    description: Service status of public competitions

servers:
  - url: /openapi/application/professionisti/api/v1
    description: base url
    x-sandbox: true

paths:
  /competitions:
    get:
      tags:
        - competition-data
      operationId: fetchCompetitions
      description: Retrieves all public competitions based on search parameters.
      responses:
        '200':
          description: Successful operation
          content:
            application/jsonlist+json:
              schema:
                $ref: '#/components/schemas/Competition'
        default:
          description: Unsuccessful operation
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorVM'

  /competitions/{competition-id}:
    get:
      tags:
        - competition-data
      operationId: fetchCompetitionItem
      description: Retrieves a public competition by its id.
      parameters:
        - name: competition-id
          in: path
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 50
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompetitionDetail'
        default:
          description: Unsuccessful operation
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorVM'

  /competitions/{competition-id}/applications:
    get:
      tags:
        - application-data
      operationId: fetchApplications
      description: Retrieves all applications based on search parameters.
      parameters:
        - name: competition-id
          in: path
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 50
      responses:
        '200':
          description: Successful operation
          content:
            application/jsonlist+json:
              schema:
                $ref: '#/components/schemas/Application'
        default:
          description: Unsuccessful operation
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorVM'

  /competitions/{competition-id}/applications/{application-id}:
    get:
      tags:
        - application-data
      operationId: fetchApplicationItem
      description: Retrieves an application by its id.
      parameters:
        - name: competition-id
          in: path
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 50
        - name: application-id
          in: path
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 40
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationDetail'
        default:
          description: Unsuccessful operation
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorVM'

  /competitions/{competition-id}/rankings:
    get:
      tags:
        - ranking-data
      operationId: fetchRankings
      description: Retrieves all rankings based on search parameters.
      parameters:
        - name: competition-id
          in: path
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 50
      responses:
        '200':
          description: Successful operation
          content:
            application/jsonlist+json:
              schema:
                $ref: '#/components/schemas/Ranking'
        default:
          description: Unsuccessful operation
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorVM'

  /competitions/{competition-id}/rankings/{ranking-id}:
    get:
      tags:
        - ranking-data
      operationId: fetchRankingItem
      description: Retrieves a ranking by its id.
      parameters:
        - name: competition-id
          in: path
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 50
        - name: ranking-id
          in: path
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 40
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RankingDetail'
        default:
          description: Unsuccessful operation
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorVM'

  /competitions/{competition-id}/exams:
    get:
      tags:
        - exam-data
      operationId: fetchExams
      description: Retrieves all exams based on search parameters.
      parameters:
        - name: competition-id
          in: path
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 50
      responses:
        '200':
          description: Successful operation
          content:
            application/jsonlist+json:
              schema:
                $ref: '#/components/schemas/Exam'
        default:
          description: Unsuccessful operation
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorVM'

  /competitions/{competition-id}/exams/{exam-id}:
    get:
      tags:
        - exam-data
      operationId: fetchExamItem
      description: Retrieves an exam by its id.
      parameters:
        - name: competition-id
          in: path
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 50
        - name: exam-id
          in: path
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 40
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExamDetail'
        default:
          description: Unsuccessful operation
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorVM'

  /competitions/{competition-id}/exams/{exam-id}/sessions/{session-id}:
    get:
      tags:
        - exam-data
      operationId: fetchSessionItem
      description: Retrieves an exam session by its id.
      parameters:
        - name: competition-id
          in: path
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 50
        - name: exam-id
          in: path
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 40
        - name: session-id
          in: path
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 40
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionDetail'
        default:
          description: Unsuccessful operation
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorVM'

  /competitions/{competition-id}/payments/summary:
    get:
      tags:
        - fee-data
      operationId: fetchTotFees
      description: Retrieves the total fees for a specific competition.
      parameters:
        - name: competition-id
          in: path
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 50
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResponse'
        default:
          description: Unsuccessful operation
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorVM'

  /competitions/{competition-id}/payments:
    get:
      tags:
        - fee-data
      operationId: fetchFees
      description: Retrieves all fees based on search parameters.
      parameters:
        - name: competition-id
          in: path
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 50
      responses:
        '200':
          description: Successful operation
          content:
            application/jsonlist+json:
              schema:
                $ref: '#/components/schemas/Payment'
        default:
          description: Unsuccessful operation
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorVM'
  /status:
    get:
      tags:
        - service-status
      operationId: getStatus
      description: Retrieves the public competition service status.
      responses:
        '200':
          description: OK
        default:
          description: Unsuccessful operation
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorVM'

components:
  schemas:
    ErrorVM:
      description: |
        This schema extends RFC7807 Problem Details for HTTP APIs
        with the additional `timestamp` property used for debugging
        purposes.
      type: object
      required:
        - title
        - status
      properties:
        type:
          type: string
          format: uri
          description: Unique identifier of the type of issue
          example: "https://example.com/probs/out-of-credit"
        title:
          type: string
          description: Human readable description of the issue
          maxLength: 255
          example: "You do not have enough credit."
        status:
          type: integer
          format: int32
          minimum: 100
          maximum: 599
          description: Same as returned Http Status code
          example: 400
        timestamp:
          type: string
          description: Timestamp for debugging purposes
          maxLength: 25

    CategoriesResponse:
      description: Response object containing an array of category objects.
      type: object
      properties:
        categories:
          type: array
          items:
            $ref: '#/components/schemas/Category'

    Category:
      description: Contains the category of a public competition.
      type: object
      properties:
        id:
          type: string
          maxLength: 50
          example: '5'
        name:
          type: string
          maxLength: 100
          example: 'Selezione Professionisti ed Esperti'
        description:
          type: string
          maxLength: 100
          example: 'Selezione Professionisti ed Esperti'
      additionalProperties: false
      x-jsonld-type: https://w3id.org/italia/public-administration-governance/onto/public-sector-recruitment/CategoriaDiReclutamento
      x-jsonld-context:
        "@vocab": https://w3id.org/italia/public-administration-governance/onto/public-sector-recruitment/
        id: http://purl.org/dc/terms/identifier
        name: https://w3id.org/italia/onto/l0/name
        description: https://w3id.org/italia/onto/l0/description
      example:
        id: '5'
        name: 'Selezione Professionisti ed Esperti'
        description: 'Selezione Professionisti ed Esperti'

    AreasResponse:
      description: Response object containing an array of Area objects.
      type: object
      properties:
        areas:
          type: array
          items:
            $ref: '#/components/schemas/Area'

    Area:
      description: Contains the geographical area of a public competition.
      type: object
      properties:
        id:
          type: string
          maxLength: 12
          example: '5'
        name:
          type: string
          maxLength: 60
          example: 'Lombardia'
      additionalProperties: false
      x-jsonld-type: https://w3id.org/italia/public-administration-governance/onto/public-sector-recruitment/AreaGeografica
      x-jsonld-context:
        "@vocab": https://w3id.org/italia/public-administration-governance/onto/public-sector-recruitment/
        id: http://purl.org/dc/terms/identifier
        name: https://w3id.org/italia/onto/l0/name
      example:
        id: '5'
        name: 'Lombardia'

    CompetitionStatusesResponse:
      description: Response object containing an array of CompetitionStatus objects.
      type: object
      properties:
        competitionStatuses:
          type: array
          items:
            $ref: '#/components/schemas/CompetitionStatus'

    CompetitionStatus:
      description: Contains the status of a public competition.
      type: object
      properties:
        name:
          type: string
          enum: [OPEN, CLOSED]
          example: OPEN
        label:
          type: string
          example: 'Aperto'
      additionalProperties: false
      x-jsonld-type: https://w3id.org/italia/public-administration-governance/onto/public-sector-recruitment/StatusDiProceduraReclutamento
      x-jsonld-context:
        "@vocab": https://w3id.org/italia/public-administration-governance/onto/public-sector-recruitment/
        name: https://w3id.org/italia/onto/l0/name
        label: https://w3id.org/italia/onto/l0/description
      example:
        name: OPEN
        label: 'Aperto'

    SalariesResponse:
      description: Response object containing an array of Salary objects.
      type: object
      properties:
        salaries:
          type: array
          items:
            $ref: '#/components/schemas/Salary'

    Salary:
      description: Contains a salary range in euro of a public competition.
      type: object
      required:
        - label
        - max
        - min
      properties:
        label:
          type: string
          example: 'da 1000 a 20000'
        max:
          type: integer
          format: int32
          maximum: 99999999
          example: 20000
        min:
          type: integer
          format: int32
          maximum: 99999999
          minimum: 0
          example: 1000
      additionalProperties: false
      x-jsonld-type: https://w3id.org/italia/public-administration-governance/onto/public-sector-recruitment/IntervalloSalariale
      x-jsonld-context:
        "@vocab": https://w3id.org/italia/public-administration-governance/onto/public-sector-recruitment/
        label: https://w3id.org/italia/onto/l0/description
        max: salarioMassimo
        min: salarioMinimo
      example:
        label: 'da 1000 a 20000'
        max: 20000
        min: 1000

    BranchesResponse:
      description: Response object containing an array of Branch objects.
      type: object
      properties:
        branches:
          type: array
          items:
            $ref: '#/components/schemas/Branch'

    Branch:
      description: Contains the economical branch of a public competition.
      type: object
      properties:
        id:
          type: string
          maxLength: 50
          example: '5'
        name:
          type: string
          maxLength: 100
          example: 'Appalti'
      additionalProperties: false
      x-jsonld-type: https://w3id.org/italia/public-administration-governance/onto/public-sector-recruitment/TipoDiAttività
      x-jsonld-context:
        "@vocab": https://w3id.org/italia/public-administration-governance/onto/public-sector-recruitment/
        id:
          '@id': haTipoDiAttività
          '@type': '@id'
          '@context':
              "@base": 'https://w3id.org/italia/public-administration-governance/controlled-vocabulary/data/elenco_concorso_settori/'
        name: https://w3id.org/italia/onto/l0/name
      example:
        id: '5'
        name: 'Appalti'

    Company:
      description: Contains the company of a public competition.
      type: object
      properties:
        id:
          type: string
          maxLength: 20
          example: '4'
        ipaCode:
          type: string
          example: '004OLJ'
        name:
          type: string
          maxLength: 255
          example: 'Regione Abruzzo'
      additionalProperties: false
      x-jsonld-type: https://w3id.org/italia/onto/COV/PublicOrganization
      x-jsonld-context:
        "@vocab": https://w3id.org/italia/onto/COV/
        id: http://purl.org/dc/terms/identifier
        ipaCode: IPAcode
        name: legalName
      example:
        id: '4'
        ipaCode: '004OLJ'
        name: 'Regione Abruzzo'

    Competition:
      description: Retrieves a public competition object.
      type: object
      properties:
        id:
          type: string
          maxLength: 50
          example: '0000ba506c7c45b9929b3a4apql1f6da'
        title:
          type: string
          maxLength: 500
          example: "AVVISO PUBBLICO DI SELEZIONE PER MOBILITA' ESTERNA VOLONTARIA"
        description:
          type: string
          description: Large text content
          example: "<p>Avviso Pubblico Finalizzato alla Acquisizione delle Manifestazione di Interesse da parte delle amministrazioni dei piccoli Comuni</p>"
        companies:
          type: array
          items:
            $ref: '#/components/schemas/Company'
        areas:
          type: array
          items:
            $ref: '#/components/schemas/Area'
        assessment:
          $ref: '#/components/schemas/Assessment'
        status:
          $ref: '#/components/schemas/CompetitionStatus'
        publicationDate:
          type: string
          format: date-time
          example: '2024-05-28T14:35:22+02:00'
        expiryDate:
          type: string
          format: date-time
          example: '2024-12-28T14:35:22+02:00'
        soughtAfterFigure:
          type: string
          description: Large text content
          example: 'Esperto in attività di natura contabile e fiscale con esperienza minima di 3 anni fino a 5 anni'
      additionalProperties: false
      x-jsonld-type: https://w3id.org/italia/public-administration-governance/onto/public-sector-recruitment/PubblicazioneDiReclutamentoPA
      x-jsonld-context:
        "@vocab": https://w3id.org/italia/public-administration-governance/onto/public-sector-recruitment/
        id: http://purl.org/dc/terms/identifier
        title: titoloProceduraReclutamento
        description: https://w3id.org/italia/onto/l0/description
        companies:
          '@id': haEntePubblicoCoinvolto
        areas:
          '@id': haAreaDiReclutamento
        assessment:
          '@id': haModalitàDiValutazione
        status:
          '@id': haStatoPubblicazioneDiReclutamento
        publicationDate: dataDiPubblicazione
        expiryDate: dataTermineCandidature
        soughtAfterFigure: figuraProfessionaleDaReclutare
      example:
        id: '0000ba506c7c45b9929b3a4apql1f6da'
        title: 'AVVISO PUBBLICO DI SELEZIONE PER MOBILITA ESTERNA VOLONTARIA'
        description: '<p>Avviso Pubblico Finalizzato alla Acquisizione delle Manifestazione di Interesse da parte delle amministrazioni dei piccoli Comuni</p>'
        companies:
          - id: '4'
            ipaCode: '0040LJ'
            name: 'Regione Abruzzo'
        areas:
          - id: '5'
            name: 'Lombardia'
        publicationDate: '2024-05-28T14:35:22+02:00'
        expiryDate: '2024-12-28T14:35:22+02:00'
        soughtAfterFigure: 'Esperto in attività di natura contabile e fiscale con esperienza minima di 3 anni fino a 5 anni'

    CompetitionDetail:
      description: Retrieves a public competition detail object.
      type: object
      properties:
        id:
          type: string
          maxLength: 50
          example: '0000ba506c7c45b9929b3a4apql1f6da'
        title:
          type: string
          maxLength: 500
          example: "AVVISO PUBBLICO DI SELEZIONE PER MOBILITA' ESTERNA VOLONTARIA"
        description:
          type: string
          description: Large text content
          example: "<p>Avviso Pubblico Finalizzato alla Acquisizione delle Manifestazione di Interesse da parte delle amministrazioni dei piccoli Comuni</p>"
        shortDescription:
          type: string
          description: Large text content
          example: "<p>Avviso Pubblico Finalizzato alla Acquisizione delle Manifestazione di Interesse da parte delle amministrazioni dei piccoli Comuni</p>"
        requirements:
          type: array
          items:
            type: string
            maxLength: 1000
          example: ["Essere dipendente in servizio a tempo indeterminato, con superamento del periodo di prova, presso Aziende o Enti del SSN, di cui agli art. 6/7 del CCNQ per la definizione dei comparti di contrattazione stipulato il 03/08/2021", "Non aver riportato nell’ultimo biennio valutazioni negative"]
        status:
          $ref: '#/components/schemas/CompetitionStatus'
        visibilityDate:
          type: string
          format: date-time
          example: '2024-05-28T14:35:22+02:00'
        publicationDate:
          type: string
          format: date-time
          example: '2024-05-28T14:35:22+02:00'
        expiryDate:
          type: string
          format: date-time
          example: '2024-12-28T14:35:22+02:00'
        assessment:
          $ref: '#/components/schemas/Assessment'
        numExams:
          type: integer
          format: int32
          example: 3
        numAvailablePositions:
          type: integer
          format: int32
          example: 50
        numPendingApplications:
          type: integer
          format: int64
          example: 5000
        numSubmittedApplications:
          type: integer
          format: int64
          example: 500000
        paymentRequired:
          type: boolean
          example: true
        companies:
          type: array
          items:
            $ref: '#/components/schemas/Company'
        attachments:
          type: array
          items:
            $ref: '#/components/schemas/Attachment'
        importedApplications:
          type: boolean
          example: false
        areas:
          type: array
          items:
            $ref: '#/components/schemas/Area'
        category:
          type: array
          items:
            $ref: '#/components/schemas/Category'
        branches:
          type: array
          items:
            type: string
            maxLength: 100
          example: ["Appalti", "Accorpamento di ambiti previsti e non previsti"]
        salary:
          $ref: '#/components/schemas/Salary'
        soughtAfterFigure:
          type: string
          description: Large text content
          example: 'Esperto in attività di natura contabile e fiscale con esperienza minima di 3 anni fino a 5 anni'
        officialGazetteLinkTitle:
          type: string
          maxLength: 500
          example: "Gazzetta Ufficiale n. 103 del 30/12/2022"
        officialGazetteLink:
          type: string
          maxLength: 500
          example: "https://www.gazzettaufficiale.it/30giorni/concorsi"
        paSiteLink:
          type: string
          maxLength: 500
          example: "https://selezionionline.cnr.it/"
        redirectLink:
          type: string
          maxLength: 500
          example: "https://selezionionline.cnr.it/"
        contactPersonEmail:
          type: string
          format: email
          maxLength: 500
          example: user@example.com
        oivCode:
          type: string
          maxLength: 500
          example: "735ecbac0a563b4c70aa195e5c12fc1f"
        externalId:
          type: string
          maxLength: 500
      additionalProperties: false
      x-jsonld-type: https://w3id.org/italia/public-administration-governance/onto/public-sector-recruitment/PubblicazioneDiReclutamentoPA
      x-jsonld-context:
        "@vocab": https://w3id.org/italia/public-administration-governance/onto/public-sector-recruitment/
        id: http://purl.org/dc/terms/identifier
        title: titoloProceduraReclutamento
        description: https://w3id.org/italia/onto/l0/description
        shortDescription: descrizioneBrevePubblicazione
        requirements:
          '@id': haRequisitoDiReclutamento
        status:
          '@id': haStatoPubblicazioneDiReclutamento
        visibilityDate: dataDiVisibilità
        publicationDate: dataDiPubblicazione
        expiryDate: dataTermineCandidature
        assessment:
          '@id': haModalitàDiValutazione
        numExams: numeroEsamiDiSelezione
        numAvailablePositions: numeroDiPosizioniAperte
        numPendingApplications: numeroDiCandidatureInPreparazione
        numSubmittedApplications: numeroDiCandidatureRicevute
        paymentRequired: avvisoPagamentoRichiesto
        companies:
          '@id': haEntePubblicoCoinvolto
        attachments:
          '@id': haAllegatoPubblicazioneReclutamento
        importedApplications: avvisoCandidatureAcquisite
        areas:
          '@id': haAreaDiReclutamento
        category:
          '@id': haCategoriaDiReclutamento
        branches:
          '@id': haTipoDiAttività
        salary:
          '@id': haIntervalloSalariale
        soughtAfterFigure: figuraProfessionaleDaReclutare
        officialGazetteLinkTitle: titoloInGU
        officialGazetteLink: collegamentoAGU
        paSiteLink: collegamentoASitoPA
        redirectLink: collegamentoDiReindirizzamento
        contactPersonEmail:
          '@id': https://w3id.org/italia/onto/SM/hasContactPoint
          '@context':
              label: http://www.w3.org/2000/01/rdf-schema#label
        oivCode: codiceOIVDiControllo
        externalId: identificativoEsterno
      example:
        id: '0000ba506c7c45b9929b3a4apql1f6da'
